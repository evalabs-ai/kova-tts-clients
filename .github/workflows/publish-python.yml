name: Publish Python package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade build pytest pytest-asyncio
      - run: python -m pytest packages/python/tests
      - run: python -m build

      - uses: pypa/gh-action-pypi-publish@release/v1
